apiVersion: apps/v1
kind: Deployment
metadata:
  name: crop-yield-agent
  namespace: team1
  labels:
    app.kubernetes.io/name: crop-yield-agent
    kagenti.io/type: agent
    kagenti.io/framework: Python
    kagenti.io/transport: a2a
    kagenti.io/inject: enabled
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crop-yield-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crop-yield-agent
        kagenti.io/type: agent
        kagenti.io/framework: Python
        kagenti.io/transport: a2a
        kagenti.io/inject: enabled
      annotations:
        kagenti.io/outbound-ports-exclude: "11434"
    spec:
      serviceAccountName: crop-yield-agent
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: registry.cr-system.svc.cluster.local:5000/crop-yield-agent:latest
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: DB_PATH
              value: /app/crop.db
            - name: OLLAMA_BASE_URL
              value: "http://host.docker.internal:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:3b-instruct-fp16"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.kagenti-system.svc.cluster.local:8335"
            - name: KEYCLOAK_URL
              value: "http://keycloak.keycloak.svc.cluster.local:8080"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 1000
      volumes:
        - name: tmp
          emptyDir: {}